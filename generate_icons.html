<!DOCTYPE html>
<html>
<head>
  <title>Generar iconos Dark Mode</title>
  <style>
    body { font-family: sans-serif; padding: 24px; background: #0f0f1a; color: #e2e2f0; }
    button { padding: 12px 24px; background: #6c63ff; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 16px; }
    button:hover { background: #a855f7; }
    p { margin-bottom: 16px; color: #aaa; }
    canvas { border: 1px solid #333; margin: 4px; image-rendering: pixelated; }
  </style>
</head>
<body>
  <h2>Generador de iconos — Dark / White Mode</h2>
  <p>Haz click para generar y descargar los 3 iconos PNG. Guárdalos en la carpeta <strong>icons/</strong> de la extensión.</p>
  <button onclick="generate()">Generar y descargar iconos PNG</button>
  <div id="previews" style="margin-top:20px;"></div>
  <script>
  function drawMoon(size) {
    const canvas = document.createElement('canvas');
    canvas.width = size;
    canvas.height = size;
    const ctx = canvas.getContext('2d');

    // Fondo con esquinas redondeadas
    const radius = size * 0.22;
    ctx.beginPath();
    ctx.moveTo(radius, 0);
    ctx.lineTo(size - radius, 0);
    ctx.quadraticCurveTo(size, 0, size, radius);
    ctx.lineTo(size, size - radius);
    ctx.quadraticCurveTo(size, size, size - radius, size);
    ctx.lineTo(radius, size);
    ctx.quadraticCurveTo(0, size, 0, size - radius);
    ctx.lineTo(0, radius);
    ctx.quadraticCurveTo(0, 0, radius, 0);
    ctx.closePath();
    ctx.fillStyle = '#0f0f1a';
    ctx.fill();

    // Luna (círculo morado)
    const moonX = size * 0.44;
    const moonY = size * 0.52;
    const moonR = size * 0.27;
    ctx.beginPath();
    ctx.arc(moonX, moonY, moonR, 0, Math.PI * 2);
    ctx.fillStyle = '#a855f7';
    ctx.fill();

    // Recorte oscuro (crea el efecto creciente)
    ctx.beginPath();
    ctx.arc(moonX + moonR * 0.5, moonY - moonR * 0.28, moonR * 0.78, 0, Math.PI * 2);
    ctx.fillStyle = '#0f0f1a';
    ctx.fill();

    // Estrellas (solo en tamaños grandes)
    if (size >= 48) {
      const stars = [[0.72, 0.26, 0.038], [0.80, 0.46, 0.024], [0.66, 0.16, 0.022]];
      stars.forEach(([x, y, r]) => {
        ctx.beginPath();
        ctx.arc(size * x, size * y, size * r, 0, Math.PI * 2);
        ctx.fillStyle = '#6c63ff';
        ctx.fill();
      });
    } else {
      // Estrella pequeña para 16px
      ctx.beginPath();
      ctx.arc(size * 0.76, size * 0.28, size * 0.07, 0, Math.PI * 2);
      ctx.fillStyle = '#6c63ff';
      ctx.fill();
    }

    return canvas;
  }

  function download(canvas, filename) {
    const a = document.createElement('a');
    a.download = filename;
    a.href = canvas.toDataURL('image/png');
    a.click();
  }

  function generate() {
    const sizes = [16, 48, 128];
    const previews = document.getElementById('previews');
    previews.innerHTML = '<p>Iconos generados (guárdalos en icons/):</p>';

    sizes.forEach(size => {
      const canvas = drawMoon(size);
      canvas.title = `icon${size}.png`;
      canvas.style.width = canvas.style.height = Math.max(size, 64) + 'px';
      previews.appendChild(canvas);
      setTimeout(() => download(canvas, `icon${size}.png`), sizes.indexOf(size) * 300);
    });
  }
  </script>
</body>
</html>
